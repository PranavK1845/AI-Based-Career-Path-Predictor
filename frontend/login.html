<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Career Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <form class="card p-4 shadow-lg" onsubmit="return false;" autocomplete="off">
                    
                    <input type="text" name="prevent_autofill" id="prevent_autofill" value="" style="display:none;" />
                    <input type="password" name="password_fake" id="password_fake" value="" style="display:none;" />

                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-primary">Career AI</h2>
                        <p class="text-muted" id="auth-subtitle">Sign in to your account</p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email Address</label>
                        <input type="email" id="email" class="form-control" autocomplete="new-password" placeholder="name@example.com">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Password</label>
                        <input type="password" id="password" class="form-control" autocomplete="new-password" placeholder="••••••••">
                    </div>

                    <button id="loginBtn" onclick="login()" class="btn btn-primary w-100 mb-3 py-2 fw-bold">Login</button>
                    
                    <div class="text-center">
                        <p class="text-muted small mb-2">Don't have an account?</p>
                        <a href="register.html" class="btn btn-outline-success w-100 py-2">Create New Account</a>
                    </div>

                    <div id="msg" class="text-center mt-3 small"></div>
                </form>
                
                <p class="text-center mt-4 text-white extra-small">&copy; 2026 AI Career Path Predictor</p>
            </div>
        </div>
    </div>
</div>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            if(document.getElementById('email')) document.getElementById('email').value = "";
            if(document.getElementById('password')) document.getElementById('password').value = "";
        }, 50);
    });
</script>
<script src="js/auth.js"></script>
</body>
</html>
