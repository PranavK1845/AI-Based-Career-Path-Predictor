<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Career Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main-wrapper">
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-primary">Join Career AI</h2>
                        <p class="text-muted">Fill in your details to get started</p>
                    </div>
                    
                    <form id="registerForm" onsubmit="register(); return false;" autocomplete="off">
                        <input type="text" name="prevent_autofill" id="prevent_autofill" value="" style="display:none;" />
                        <input type="password" name="password_fake" id="password_fake" value="" style="display:none;" />

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Full Name</label>
                            <input type="text" id="regName" class="form-control" placeholder="John Doe" autocomplete="new-password" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email Address</label>
                            <input type="email" id="regEmail" class="form-control" placeholder="name@example.com" autocomplete="new-password" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Password</label>
                            <input type="password" id="regPass" class="form-control" placeholder="At least 6 characters" autocomplete="new-password" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">Date of Birth</label>
                                <input type="date" id="regDob" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">Gender</label>
                                <select id="regGender" class="form-select" required>
                                    <option value="">Select...</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Current Education</label>
                            <input type="text" id="regEdu" class="form-control" placeholder="e.g. B.Tech CS, 12th Grade" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold">Profile Picture (Optional)</label>
                            <input type="file" id="regPhoto" class="form-control" accept="image/*">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">Register Now</button>
                        
                        <div class="text-center">
                            <span class="text-muted small">Already have an account? <a href="login.html" class="text-decoration-none fw-bold">Login here</a></span>
                        </div>
                        <div id="regMsg" class="text-center mt-3 small"></div>
                    </form>
                </div>
                <p class="text-center mt-4 text-white extra-small">&copy; 2026 AI Career Path Predictor</p>
            </div>
        </div>
    </div>
</div>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('regName').value = "";
            document.getElementById('regEmail').value = "";
            document.getElementById('regPass').value = "";
        }, 50);
    });
</script>
<script src="js/auth.js"></script>
</body>
</html>
